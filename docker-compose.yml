version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: m_app_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-m_application}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: m_app_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: m_app_backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-m_application}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: m_app_worker
    restart: always
    depends_on:
      - redis
      - db
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-m_application}
      - REDIS_URL=redis://redis:6379/0
    command: celery -A celery_app worker --loglevel=info

volumes:
  postgres_data:
